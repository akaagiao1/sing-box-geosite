name: Update rule sets

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

concurrency:
  group: rule-update-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -v

  update:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      SING_BOX_VERSION: "1.13.12"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install sing-box
        run: |
          set -Eeuo pipefail
          archive="sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          curl --fail --location --retry 3 --output "$archive" \
            "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/${archive}"
          tar -xzf "$archive"
          echo "$PWD/sing-box-${SING_BOX_VERSION}-linux-amd64" >> "$GITHUB_PATH"
      - name: Update AdGuard rule set
        run: |
          curl --fail --location --retry 3 \
            --output rule/adservers.txt \
            "https://raw.githubusercontent.com/AdguardTeam/AdguardFilters/master/BaseFilter/sections/adservers.txt"
          sing-box rule-set convert --type adguard \
            --output rule/adservers.srs rule/adservers.txt
      - name: Generate rule sets
        run: python main.py
      - name: Commit changes
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add rule
          if git diff --staged --quiet; then
            echo "No rule changes"
          else
            git commit -m "chore(rules): update generated rule sets"
            git push
          fi
